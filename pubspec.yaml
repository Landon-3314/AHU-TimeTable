name: timetable
description: "一款简洁实用的大学课表应用。"
publish_to: 'none'
version: 0.3.5+2

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  webview_flutter: ^4.13.0
  webview_flutter_android: 4.10.13
  intl: ^0.20.2
  app_settings: ^5.1.1
  sound_mode: ^3.1.1
  permission_handler: ^12.0.1
  html: ^0.15.4
  flutter_launcher_icons: ^0.13.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  crypto: ^3.0.6
  http: ^1.6.0
  cronet_http: ^1.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/app_icon.png"
  adaptive_icon_background: "#FFFFFF"

name: Android Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - update.json

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android-apk:
    name: Build and publish APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Resolve version from pubspec.yaml
        id: version
        shell: bash
        run: |
          VERSION="$(awk '/^version:/ { print $2; exit }' pubspec.yaml | tr -d '\r')"
          if [ -z "$VERSION" ]; then
            echo "Unable to find version in pubspec.yaml" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_name=Timetable v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare Android signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD_SECRET: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_ALIAS_SECRET: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEY_PASSWORD_SECRET: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/android-keystore"

          if [ -n "$ANDROID_KEYSTORE_BASE64" ] \
            && [ -n "$ANDROID_KEYSTORE_PASSWORD_SECRET" ] \
            && [ -n "$ANDROID_KEYSTORE_ALIAS_SECRET" ] \
            && [ -n "$ANDROID_KEY_PASSWORD_SECRET" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/android-keystore/release.keystore"
            {
              echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/android-keystore/release.keystore"
              echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD_SECRET"
              echo "ANDROID_KEYSTORE_ALIAS=$ANDROID_KEYSTORE_ALIAS_SECRET"
              echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD_SECRET"
            } >> "$GITHUB_ENV"
          else
            keytool -genkeypair \
              -v \
              -storetype JKS \
              -keystore "$RUNNER_TEMP/android-keystore/debug.keystore" \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            {
              echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/android-keystore/debug.keystore"
              echo "ANDROID_KEYSTORE_PASSWORD=android"
              echo "ANDROID_KEYSTORE_ALIAS=androiddebugkey"
              echo "ANDROID_KEY_PASSWORD=android"
            } >> "$GITHUB_ENV"
          fi

      - name: Build release APKs with split per ABI
        run: flutter build apk --release --split-per-abi

      - name: Prepare versioned release assets
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "release/timetable-${VERSION}-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "release/timetable-${VERSION}-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk "release/timetable-${VERSION}-x86_64.apk"

      - name: Prepare update manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import urllib.parse

          version = os.environ["VERSION"]
          repository = os.environ["GITHUB_REPOSITORY"]
          tag = f"v{version}"
          release_base = (
              f"https://github.com/{repository}/releases/download/"
              f"{urllib.parse.quote(tag, safe='')}"
          )
          assets = []
          for abi in ["armeabi-v7a", "arm64-v8a", "x86_64"]:
              name = f"timetable-{version}-{abi}.apk"
              path = os.path.join("release", name)
              with open(path, "rb") as handle:
                  digest = hashlib.sha256(handle.read()).hexdigest()
              assets.append({
                  "abi": abi,
                  "url": f"{release_base}/{urllib.parse.quote(name, safe='')}",
                  "sha256": digest,
                  "size": os.path.getsize(path),
              })
          manifest = {
              "versionName": version.split("+", 1)[0],
              "versionCode": int(version.split("+", 1)[1]),
              "releaseNotes": f"安课 {version} 更新。",
              "assets": assets,
          }
          with open("update.json", "w", encoding="utf-8") as handle:
              json.dump(manifest, handle, ensure_ascii=False, indent=2)
              handle.write("\n")
          PY

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-split-apks-${{ steps.version.outputs.version }}
          path: |
            release/timetable-${{ steps.version.outputs.version }}-armeabi-v7a.apk
            release/timetable-${{ steps.version.outputs.version }}-arm64-v8a.apk
            release/timetable-${{ steps.version.outputs.version }}-x86_64.apk
            update.json
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          RELEASE_NAME="${{ steps.version.outputs.release_name }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$RELEASE_NAME" \
              --latest
            gh release upload "$TAG" \
              release/*.apk update.json \
              --clobber
          else
            gh release create "$TAG" \
              release/*.apk update.json \
              --target "${GITHUB_SHA}" \
              --title "$RELEASE_NAME" \
              --generate-notes
          fi

      - name: Commit update manifest
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add update.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: update app update manifest [skip ci]"
          git push

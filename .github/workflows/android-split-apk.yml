name: Android Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - update.json

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android-apk:
    name: Build and publish APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Flutter sources
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

      - name: Run Release verifier tests
        run: python3 -m unittest tool/test_verify_release_version.py -v

      - name: Build Web release
        run: flutter build web --release

      - name: Resolve version from pubspec.yaml
        id: version
        shell: bash
        run: |
          VERSION="$(awk '/^version:/ { print $2; exit }' pubspec.yaml | tr -d '\r')"
          if [ -z "$VERSION" ]; then
            echo "Unable to find version in pubspec.yaml" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_name=Timetable v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify monotonically increasing version code
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          manifest_args=(--published-manifest update.json)
          mkdir -p "$RUNNER_TEMP/published-release"

          if gh release view --json tagName >/dev/null 2>&1; then
            gh release download \
              --pattern update.json \
              --dir "$RUNNER_TEMP/published-release"
            manifest_args+=(
              --published-manifest "$RUNNER_TEMP/published-release/update.json"
            )
          fi

          python3 tool/verify_release_version.py \
            --pubspec pubspec.yaml \
            "${manifest_args[@]}"

      - name: Prepare Android signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD_SECRET: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_ALIAS_SECRET: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEY_PASSWORD_SECRET: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_SIGNING_CERT_SHA256_SECRET: ${{ secrets.ANDROID_SIGNING_CERT_SHA256 }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/android-keystore"

          required_secrets=(
            ANDROID_KEYSTORE_BASE64
            ANDROID_KEYSTORE_PASSWORD_SECRET
            ANDROID_KEYSTORE_ALIAS_SECRET
            ANDROID_KEY_PASSWORD_SECRET
            ANDROID_SIGNING_CERT_SHA256_SECRET
          )
          for secret_name in "${required_secrets[@]}"; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required Release signing secret: $secret_name" >&2
              exit 1
            fi
          done

          keystore_path="$RUNNER_TEMP/android-keystore/release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"

          normalize_fingerprint() {
            tr '[:lower:]' '[:upper:]' | tr -d ':[:space:]'
          }
          actual_fingerprint="$(
            keytool -exportcert \
              -rfc \
              -keystore "$keystore_path" \
              -storepass "$ANDROID_KEYSTORE_PASSWORD_SECRET" \
              -alias "$ANDROID_KEYSTORE_ALIAS_SECRET" |
              openssl x509 -noout -fingerprint -sha256 |
              cut -d= -f2 |
              normalize_fingerprint
          )"
          expected_fingerprint="$(
            printf '%s' "$ANDROID_SIGNING_CERT_SHA256_SECRET" |
              normalize_fingerprint
          )"
          if [ "$actual_fingerprint" != "$expected_fingerprint" ]; then
            echo "Release keystore certificate fingerprint mismatch" >&2
            exit 1
          fi

          {
            echo "ANDROID_KEYSTORE_PATH=$keystore_path"
            echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD_SECRET"
            echo "ANDROID_KEYSTORE_ALIAS=$ANDROID_KEYSTORE_ALIAS_SECRET"
            echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD_SECRET"
            echo "ANDROID_SIGNING_CERT_SHA256=$expected_fingerprint"
          } >> "$GITHUB_ENV"

      - name: Build release APKs with split per ABI
        run: flutter build apk --release --split-per-abi

      - name: Prepare versioned release assets
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "release/timetable-${VERSION}-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "release/timetable-${VERSION}-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk "release/timetable-${VERSION}-x86_64.apk"

      - name: Verify APK signing certificate continuity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          apksigner="$(
            find "$ANDROID_HOME/build-tools" -type f -name apksigner |
              sort -V |
              tail -n 1
          )"
          if [ -z "$apksigner" ]; then
            echo "Unable to find apksigner" >&2
            exit 1
          fi

          apk_fingerprint() {
            "$apksigner" verify --print-certs "$1" |
              sed -n 's/^Signer #1 certificate SHA-256 digest: //p' |
              head -n 1 |
              tr '[:lower:]' '[:upper:]' |
              tr -d ':[:space:]'
          }

          for apk in release/*.apk; do
            fingerprint="$(apk_fingerprint "$apk")"
            if [ "$fingerprint" != "$ANDROID_SIGNING_CERT_SHA256" ]; then
              echo "Unexpected certificate fingerprint for $apk" >&2
              exit 1
            fi
          done

          if gh release view --json tagName >/dev/null 2>&1; then
            previous_dir="$RUNNER_TEMP/previous-release"
            mkdir -p "$previous_dir"
            gh release download \
              --pattern '*-arm64-v8a.apk' \
              --dir "$previous_dir"
            shopt -s nullglob
            previous_apks=("$previous_dir/"*-arm64-v8a.apk)
            if [ "${#previous_apks[@]}" -ne 1 ]; then
              echo "Expected exactly one previous arm64-v8a APK" >&2
              exit 1
            fi
            previous_fingerprint="$(apk_fingerprint "${previous_apks[0]}")"
            if [ "$previous_fingerprint" != "$ANDROID_SIGNING_CERT_SHA256" ]; then
              echo "Previous public APK certificate fingerprint mismatch" >&2
              exit 1
            fi
          fi

      - name: Prepare update manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import urllib.parse

          version = os.environ["VERSION"]
          repository = os.environ["GITHUB_REPOSITORY"]
          tag = f"v{version}"
          release_base = (
              f"https://github.com/{repository}/releases/download/"
              f"{urllib.parse.quote(tag, safe='')}"
          )
          assets = []
          for abi in ["armeabi-v7a", "arm64-v8a", "x86_64"]:
              name = f"timetable-{version}-{abi}.apk"
              path = os.path.join("release", name)
              with open(path, "rb") as handle:
                  digest = hashlib.sha256(handle.read()).hexdigest()
              assets.append({
                  "abi": abi,
                  "url": f"{release_base}/{urllib.parse.quote(name, safe='')}",
                  "sha256": digest,
                  "size": os.path.getsize(path),
              })
          manifest = {
              "versionName": version.split("+", 1)[0],
              "versionCode": int(version.split("+", 1)[1]),
              "releaseNotes": f"安课 {version} 更新。",
              "assets": assets,
          }
          with open("update.json", "w", encoding="utf-8") as handle:
              json.dump(manifest, handle, ensure_ascii=False, indent=2)
              handle.write("\n")
          PY

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-split-apks-${{ steps.version.outputs.version }}
          path: |
            release/timetable-${{ steps.version.outputs.version }}-armeabi-v7a.apk
            release/timetable-${{ steps.version.outputs.version }}-arm64-v8a.apk
            release/timetable-${{ steps.version.outputs.version }}-x86_64.apk
            update.json
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          RELEASE_NAME="${{ steps.version.outputs.release_name }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$RELEASE_NAME" \
              --latest
            gh release upload "$TAG" \
              release/*.apk update.json \
              --clobber
          else
            gh release create "$TAG" \
              release/*.apk update.json \
              --target "${GITHUB_SHA}" \
              --title "$RELEASE_NAME" \
              --generate-notes
          fi

      - name: Commit update manifest
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add update.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: update app update manifest [skip ci]"
          git push

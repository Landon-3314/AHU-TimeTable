name: Android Split APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-android-apk:
    name: Build Split APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate CI keystore
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/android-keystore"
          keytool -genkeypair \
            -v \
            -storetype JKS \
            -keystore "$RUNNER_TEMP/android-keystore/debug.keystore" \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build release APKs with split per ABI
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/android-keystore/debug.keystore
          ANDROID_KEYSTORE_PASSWORD: android
          ANDROID_KEYSTORE_ALIAS: androiddebugkey
          ANDROID_KEY_PASSWORD: android
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-split-apks
          path: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          if-no-files-found: error
